<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NixClock</title>
  <link rel="stylesheet" href="clock.css">
</head>
<body>
  <main class="clock-stage">
    <button
      class="clock"
      id="clock"
      type="button"
      aria-label="NixClock. Activate to toggle the seconds hand."
      title="Click to toggle the seconds hand"
    >
      <span class="ticks" aria-hidden="true"></span>
      <span class="hand hour-hand" aria-hidden="true"></span>
      <span class="hand minute-hand" aria-hidden="true"></span>
      <span class="hand second-hand" aria-hidden="true"></span>
      <span class="pin" aria-hidden="true"></span>
      <span class="spoken-time" id="spoken-time" aria-live="off"></span>
    </button>
  </main>
  <script src="clock.js"></script>
</body>
</html>
