<div class="desktop fantasy-desktop" data-nixbench-desktop>
  <div class="fantasy-light fantasy-light-one" aria-hidden="true"></div>
  <div class="fantasy-light fantasy-light-two" aria-hidden="true"></div>
  <section class="fantasy-dock" data-nixbench-dock
           aria-label="Enchanted application dock">
    <div class="fantasy-dock-art" aria-hidden="true"></div>
    <div class="fantasy-clock" title="Local time">
      <span class="clock-star" aria-hidden="true">&#x2726;</span>
      <strong data-nixbench-clock>00:00</strong>
    </div>
    <div class="fantasy-launchers" aria-label="Application launchers">
      <button class="fantasy-launcher terminal-icon" title="Sakura Terminal">
        <span class="launcher-image"><span class="launcher-fallback">&gt;_</span></span>
        <small>Sakura</small>
      </button>
      <button class="fantasy-launcher midori-icon" title="Midori Web Browser">
        <span class="launcher-image"><span class="launcher-fallback">WWW</span></span>
        <small>Midori</small>
      </button>
      <button class="fantasy-launcher thunar-icon" title="Thunar File Manager">
        <span class="launcher-image"><span class="launcher-fallback">DIR</span></span>
        <small>Thunar</small>
      </button>
    </div>
    <div class="minimized-windows" data-nixbench-minimized-windows
         aria-label="Minimized windows"></div>
  </section>
</div>
