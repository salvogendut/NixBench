<div class="window-frame fantasy-window" data-nixbench-window>
  <div class="fantasy-horn" aria-hidden="true"></div>
  <header class="titlebar" data-nixbench-action="move">
    <span class="mane" aria-hidden="true"></span>
    <span class="title" data-nixbench-title>Window</span>
    <nav class="window-controls" aria-label="Window controls">
      <button data-nixbench-action="minimize" aria-label="Minimize">&#x2212;</button>
      <button data-nixbench-action="maximize" aria-label="Maximize">&#x25c7;</button>
      <button data-nixbench-action="close" aria-label="Close">&#xd7;</button>
    </nav>
    <span class="tail" aria-hidden="true"></span>
  </header>
</div>
