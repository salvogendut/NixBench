<div class="desktop cde-desktop" data-nixbench-desktop>
  <section class="cde-dock" data-nixbench-dock aria-label="CDE front panel">
    <div class="dock-handle dock-handle-left" aria-hidden="true"></div>
    <div class="dock-section clock-section" data-nixbench-action="dock-clock">
      <div class="analog-clock" aria-label="Local time">
        <span class="clock-hand hour-hand"></span>
        <span class="clock-hand minute-hand"></span>
        <span class="clock-center"></span>
      </div>
      <strong class="clock-label" data-nixbench-clock>00:00</strong>
    </div>
    <div class="dock-section date-section" aria-label="Calendar">
      <div class="calendar-page" title="Today's date">
        <span class="date-month" data-nixbench-date-month>JUL</span>
        <strong class="date-day" data-nixbench-date-day>19</strong>
        <span class="date-weekday" data-nixbench-date-weekday>SUN</span>
      </div>
    </div>
    <div class="dock-section launch-section" aria-label="Application launchers">
      <button class="cde-icon launcher-icon terminal-icon" title="Sakura Terminal">
        <span class="launcher-image"><span class="launcher-fallback">&gt;_</span></span>
        <small>Sakura</small>
      </button>
      <button class="cde-icon launcher-icon midori-icon" title="Midori Web Browser">
        <span class="launcher-image"><span class="launcher-fallback">WWW</span></span>
        <small>Midori</small>
      </button>
      <button class="cde-icon launcher-icon thunar-icon" title="Thunar File Manager">
        <span class="launcher-image"><span class="launcher-fallback folder-glyph"></span></span>
        <small>Thunar</small>
      </button>
    </div>
    <div class="minimized-windows" data-nixbench-minimized-windows
         aria-label="Minimized windows"></div>
    <div class="dock-section utility-section">
      <button class="cde-icon palette-icon" title="Style">&#x25cf;</button>
      <button class="cde-icon briefcase-icon" title="Applications">&#x25a3;</button>
      <button class="cde-icon trash-icon" title="Trash">&#x25a7;</button>
    </div>
    <div class="dock-handle dock-handle-right" aria-hidden="true"></div>
  </section>
</div>
