<div class="window-frame cde-window" data-nixbench-window>
  <header class="titlebar" data-nixbench-action="move">
    <nav class="window-controls window-controls-left"
         aria-label="Minimize window">
      <button data-nixbench-action="minimize" aria-label="Minimize">_</button>
    </nav>
    <span class="title" data-nixbench-title>Window</span>
    <nav class="window-controls window-controls-right"
         aria-label="Window controls">
      <button data-nixbench-action="maximize" aria-label="Maximize">&#x25a1;</button>
      <button data-nixbench-action="close" aria-label="Close">X</button>
    </nav>
  </header>
  <nav class="client-menubar" aria-label="Application menu">
    <span>Window</span><span>Edit</span><span>Options</span><span>Help</span>
  </nav>
  <div class="resize-grip"
       data-nixbench-action="resize_south_east"
       aria-hidden="true"></div>
</div>
